spring.application.name=Joyalex18k

#credenciales de conexion
server.port=8081

# Aseg·rate de que tu base de datos 'Joyalex18k' estķ creada en MySQL a travķs de phpMyAdmin o la lĒnea de comandos
spring.datasource.url=jdbc:mysql://localhost:3306/Joyalex18k?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=


#instalar driver de msql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# hibernate actualice la base de datos cada q se agregan o modifcan datos
spring.jpa.hibernate.ddl-auto=update

#mostrar las instrucciones en consola de sql que se ejecutan
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true # Agregado para formatear el SQL en la consola

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ? Agregar estas configuraciones para JSON (generalmente no son estrictamente necesarias, pero no causan da±o)
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.favor-path-extension=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.http.converters.preferred-json-mapper=jackson
spring.jpa.open-in-view=false